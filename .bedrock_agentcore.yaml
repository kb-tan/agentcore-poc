# Amazon Bedrock AgentCore deployment configuration
# Generated by agentcore configure --entrypoint src/server.ts

agent:
  name: agentcore-langgraph-poc
  description: "LangGraph.js customer support agent with memory, tool use, traceability, and A/B testing"
  entrypoint: src/server.ts
  runtime: container
  protocol: http

deployment:
  region: us-west-2
  container:
    platform: linux/arm64
    port: 8080
    dockerfile: Dockerfile

endpoints:
  - name: DEFAULT
    description: "Default endpoint (latest version)"
  - name: v1-concise
    description: "Concise agent variant for A/B testing"
  - name: v2-detailed
    description: "Detailed agent variant for A/B testing"

observability:
  tracing: true
  log_group: /aws/bedrock-agentcore/runtimes/agentcore-langgraph-poc

memory:
  enabled: true
  # memory_id: <set after creating AgentCore Memory resource>

# Environment variables set at deployment:
# AGENT_OBSERVABILITY_ENABLED=true
# AWS_REGION=us-west-2
